name: Deploy Landing Page

# Push index.html to pruner-releases whenever landing/index.html changes on main.
# This lets you update the website without cutting a new binary release.
on:
  push:
    branches: [main]
    paths:
      - 'landing/index.html'

permissions:
  contents: read

jobs:
  deploy:
    name: Push to pruner-releases
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Push index.html to pruner-releases
        env:
          TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/OneGoToAI/pruner-releases.git" public-repo
          cp landing/index.html public-repo/index.html
          # .nojekyll tells GitHub Pages to skip Jekyll processing
          touch public-repo/.nojekyll
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update landing page"
          git push
