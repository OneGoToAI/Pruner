name: Release

# Triggered by pushing a version tag, e.g. git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  # ── 1. Build all binaries via cross-compilation on a single runner ───────────
  #
  # Bun supports cross-compilation with --target, so all three platform binaries
  # are compiled from a single ubuntu-latest runner.
  build:
    name: Build all binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries (cross-compile all targets)
        run: |
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile pruner-darwin-arm64
          bun build --compile --target=bun-darwin-x64   src/index.ts --outfile pruner-darwin-x64
          bun build --compile --target=bun-linux-x64    src/index.ts --outfile pruner-linux-x64

      - name: Compute SHA-256 checksums
        run: |
          sha256sum pruner-darwin-arm64 | awk '{print $1 "  pruner-darwin-arm64"}' > pruner-darwin-arm64.sha256
          sha256sum pruner-darwin-x64   | awk '{print $1 "  pruner-darwin-x64"}'   > pruner-darwin-x64.sha256
          sha256sum pruner-linux-x64    | awk '{print $1 "  pruner-linux-x64"}'    > pruner-linux-x64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            pruner-darwin-arm64
            pruner-darwin-x64
            pruner-linux-x64
            pruner-darwin-arm64.sha256
            pruner-darwin-x64.sha256
            pruner-linux-x64.sha256

  # ── 2. Create GitHub Release and upload binaries ─────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Make binaries executable
        run: chmod +x pruner-darwin-arm64 pruner-darwin-x64 pruner-linux-x64

      - name: Build checksums file
        run: cat *.sha256 > checksums.txt

      - name: Extract version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.tag }}
          name: Pruner ${{ env.tag }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/OneGoToAI/Pruner/main/install.sh | bash
            ```

            Or via Homebrew:
            ```bash
            brew install OneGoToAI/tap/pruner
            ```

            ## What's included

            | File | Platform |
            |---|---|
            | `pruner-darwin-arm64` | macOS Apple Silicon |
            | `pruner-darwin-x64` | macOS Intel |
            | `pruner-linux-x64` | Linux x64 |
            | `checksums.txt` | SHA-256 checksums |

            ## Verify checksums

            ```bash
            curl -fsSL https://github.com/OneGoToAI/Pruner/releases/download/${{ env.tag }}/checksums.txt
            ```
          files: |
            pruner-darwin-arm64
            pruner-darwin-x64
            pruner-linux-x64
            checksums.txt

  # ── 3. Auto-update Homebrew Tap (opt-in) ─────────────────────────────────────
  #
  # Enable by setting repo variable: UPDATE_HOMEBREW_TAP = true
  # Required secret: TAP_DEPLOY_TOKEN (write access to OneGoToAI/homebrew-tap)
  #
  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.UPDATE_HOMEBREW_TAP == 'true' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Compute values
        run: |
          echo "arm64_sha=$(cat pruner-darwin-arm64.sha256 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "x64_sha=$(cat pruner-darwin-x64.sha256 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: OneGoToAI/homebrew-tap
          token: ${{ secrets.TAP_DEPLOY_TOKEN }}
          path: homebrew-tap

      - name: Update Formula version and SHA-256
        run: |
          sed -i \
            -e "s|version \".*\"|version \"${{ env.version }}\"|" \
            -e "/on_arm/,/end/ s|sha256 \".*\"|sha256 \"${{ env.arm64_sha }}\"|" \
            -e "/on_intel/,/end/ s|sha256 \".*\"|sha256 \"${{ env.x64_sha }}\"|" \
            homebrew-tap/Formula/pruner.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pruner.rb
          git diff --staged --quiet || git commit -m "chore: update pruner to ${{ env.tag }}"
          git push
