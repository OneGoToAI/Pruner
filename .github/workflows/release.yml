name: Release

# Triggered by pushing a version tag, e.g. git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

# This private repo only needs read access to contents.
# Write access to the PUBLIC releases repo is handled via RELEASES_REPO_TOKEN.
permissions:
  contents: read

jobs:
  # ── 1. Build all binaries via cross-compilation on a single runner ───────────
  #
  # Bun supports cross-compilation with --target, so we compile all three
  # platform binaries from a single ubuntu-latest runner. This avoids needing
  # macOS runners (macos-13 is deprecated; macos-latest is arm64-only).
  build:
    name: Build all binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries (cross-compile all targets)
        run: |
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile pruner-darwin-arm64
          bun build --compile --target=bun-darwin-x64   src/index.ts --outfile pruner-darwin-x64
          bun build --compile --target=bun-linux-x64    src/index.ts --outfile pruner-linux-x64

      - name: Compute SHA-256 checksums
        run: |
          sha256sum pruner-darwin-arm64 | awk '{print $1 "  pruner-darwin-arm64"}' > pruner-darwin-arm64.sha256
          sha256sum pruner-darwin-x64   | awk '{print $1 "  pruner-darwin-x64"}'   > pruner-darwin-x64.sha256
          sha256sum pruner-linux-x64    | awk '{print $1 "  pruner-linux-x64"}'    > pruner-linux-x64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            pruner-darwin-arm64
            pruner-darwin-x64
            pruner-linux-x64
            pruner-darwin-arm64.sha256
            pruner-darwin-x64.sha256
            pruner-linux-x64.sha256

  # ── 2. Publish to the PUBLIC pruner-releases repo ───────────────────────────
  #
  # The source repo (OneGoToAI/Pruner) is PRIVATE.
  # Binary downloads must be publicly accessible, so we publish to a separate
  # PUBLIC repo: OneGoToAI/pruner-releases.
  #
  # Required secret: RELEASES_REPO_TOKEN
  #   A GitHub PAT (classic) or fine-grained token with:
  #     - Contents: read & write on OneGoToAI/pruner-releases
  #     - Metadata: read
  #
  release:
    name: Publish to pruner-releases
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # needed to get install.sh

      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Make binaries executable
        run: chmod +x pruner-darwin-arm64 pruner-darwin-x64 pruner-linux-x64

      - name: Build checksums file
        run: cat *.sha256 > checksums.txt

      - name: Extract version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Publish GitHub Release on the PUBLIC repo
      - uses: softprops/action-gh-release@v2
        with:
          repository: OneGoToAI/pruner-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ env.tag }}
          name: Pruner ${{ env.tag }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/OneGoToAI/pruner-releases/main/install.sh | bash
            ```

            Or via Homebrew:
            ```bash
            brew install OneGoToAI/tap/pruner
            ```

            ## Verify checksums

            ```bash
            curl -fsSL https://github.com/OneGoToAI/pruner-releases/releases/download/${{ env.tag }}/checksums.txt
            ```
          files: |
            pruner-darwin-arm64
            pruner-darwin-x64
            pruner-linux-x64
            checksums.txt

      # Push install.sh and landing page to the public repo's main branch
      - name: Push install.sh and index.html to pruner-releases
        env:
          TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ env.tag }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/OneGoToAI/pruner-releases.git" public-repo
          cp install.sh public-repo/install.sh
          cp landing/index.html public-repo/index.html
          touch public-repo/.nojekyll
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh index.html
          # Only commit if anything changed
          git diff --staged --quiet || git commit -m "release: ${TAG}"
          git push

  # ── 3. Auto-update Homebrew Tap (opt-in) ─────────────────────────────────────
  #
  # Enable by setting repo variable: UPDATE_HOMEBREW_TAP = true
  # Required secret: TAP_DEPLOY_TOKEN (write access to OneGoToAI/homebrew-tap)
  #
  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.UPDATE_HOMEBREW_TAP == 'true' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Compute values
        run: |
          echo "arm64_sha=$(cat pruner-darwin-arm64.sha256 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "x64_sha=$(cat pruner-darwin-x64.sha256 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: OneGoToAI/homebrew-tap
          token: ${{ secrets.TAP_DEPLOY_TOKEN }}
          path: homebrew-tap

      - name: Update Formula version and SHA-256
        run: |
          sed -i \
            -e "s|version \".*\"|version \"${{ env.version }}\"|" \
            -e "/on_arm/,/end/ s|sha256 \".*\"|sha256 \"${{ env.arm64_sha }}\"|" \
            -e "/on_intel/,/end/ s|sha256 \".*\"|sha256 \"${{ env.x64_sha }}\"|" \
            homebrew-tap/Formula/pruner.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pruner.rb
          git diff --staged --quiet || git commit -m "chore: update pruner to ${{ env.tag }}"
          git push
